name: Website

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Install tooling with mise
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3.6.3
        with:
          cache: true

      - name: Restore aube store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/aube/store
          key: aube-store-${{ runner.os }}-${{ hashFiles('aube-lock.yaml') }}
          restore-keys: |
            aube-store-${{ runner.os }}-

      - name: Install dependencies
        run: aube ci

      - name: Build site
        run: aube run build

      - name: Upload built site
        uses: actions/upload-artifact@v4
        with:
          name: website-dist
          path: _site
          if-no-files-found: error

  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      deployments: write
    environment:
      name: production
      url: https://runs-on-mac.com
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Install tooling with mise
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3.6.3
        with:
          cache: true

      - name: Restore aube store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/aube/store
          key: aube-store-${{ runner.os }}-${{ hashFiles('aube-lock.yaml') }}
          restore-keys: |
            aube-store-${{ runner.os }}-

      - name: Install dependencies
        run: aube ci

      - name: Download built site
        uses: actions/download-artifact@v4
        with:
          name: website-dist
          path: _site

      - name: Deploy with Wrangler
        uses: cloudflare/wrangler-action@9681c2997648301493e78cacbfb790a9f19c833f # v3.9.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./_site --project-name=runs-on-mac --branch=main --commit-dirty=true
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
